# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Shell-script Processing
        run : |
          curl -L -o updateRepoMdFileList.sh \
            https://raw.githubusercontent.com/th1nk3r-ing/ai_learn/refs/heads/main/code/updateRepoMdFileList.sh
          /bin/bash updateRepoMdFileList.sh handleGithubMdSyntax
          git status
      - name: Generate Stars Data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api users/th1nk3r-ing/starred --paginate \
            --jq '.[] | {full_name, description, stargazers_count, language, html_url, updated_at, pushed_at, topics}' \
            > /tmp/stars-raw.json
          python3 -c "
          import json, sys
          data = []
          with open('/tmp/stars-raw.json') as f:
              for line in f:
                  line = line.strip()
                  if line:
                      obj = json.loads(line)
                      data.append(obj)
          with open('stars-data.json', 'w') as f:
              json.dump({'timestamp': __import__('datetime').datetime.utcnow().isoformat() + 'Z', 'repos': data}, f)
          "
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
